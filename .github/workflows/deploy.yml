name: Deploy React to Lineup Subfolder

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build React
        run: |
          cd lineup_src
          npm install
          npm run build

      - name: Deploy to Same Branch (lineup folder)
        run: |
          rm -rf lineup
          mv lineup_src/dist lineup || mv lineup_src/build lineup
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lineup
          git commit -m "Actions: Auto-build React to lineup folder" || exit 0
          git push
